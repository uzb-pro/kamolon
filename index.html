        <option value="admin">Admin</option>

        <option value="kassir">Hisobchi</option>
      </select>
      <br />
      <!-- .... -->

      <button id="yaratish">Yaratish</button>

      <a class="keyingiSahifa" href="./xodimlar.html">Yaratilgan xodimlar</a>
